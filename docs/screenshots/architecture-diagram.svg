<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" role="img" aria-labelledby="title desc">
  <title id="title">MacroMate System Architecture</title>
  <desc id="desc">Architecture diagram showing user, frontend, state, API, business logic, external USDA service, and session storage layers with data flow.</desc>

  <defs>
    <style>
      .title { font: 700 26px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #6B7280; }
      .layer-label { font: 600 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #374151; letter-spacing: 0.08em; text-transform: uppercase; }
      .layer-title { font: 600 15px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #111827; }
      .box-title { font: 600 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #111827; }
      .box-text { font: 400 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #4B5563; }
      .box-text-sm { font: 400 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #6B7280; }
      .flow-label { font: 500 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #1A6B52; }
      .flow-num { font: 700 10px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #FFFFFF; }
      .legend-text { font: 400 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #4B5563; }
    </style>

    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#111827" flood-opacity="0.06"/>
    </filter>

    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-brand" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1A6B52"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7C3AED"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#FFFFFF"/>

  <text x="700" y="42" text-anchor="middle" class="title">MacroMate - System Architecture</text>
  <text x="700" y="66" text-anchor="middle" class="subtitle">Client-heavy Next.js app with server-proxied USDA integration</text>

  <rect x="60" y="88" width="1280" height="72" rx="12" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="110" class="layer-label">1. User Layer</text>

  <rect x="520" y="104" width="120" height="44" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <circle cx="548" cy="126" r="10" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <path d="M538 140 Q548 132 558 140" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
  <text x="566" y="130" class="box-title">User</text>

  <line x1="640" y1="126" x2="680" y2="126" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="680" y="104" width="200" height="44" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="696" y="114" width="28" height="20" rx="3" fill="none" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="702" y1="134" x2="718" y2="134" stroke="#6B7280" stroke-width="1.2"/>
  <text x="734" y="130" class="box-title">Browser</text>

  <line x1="700" y1="148" x2="700" y2="178" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="178" width="1280" height="148" rx="12" fill="#F0FDF7" stroke="#BBF7D0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="200" class="layer-label">2. Frontend Layer</text>
  <text x="230" y="200" class="layer-title">Next.js 15 App Router (Client Components)</text>

  <rect x="100" y="218" width="270" height="88" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="120" y="242" class="box-title">Food Search UI</text>
  <text x="120" y="262" class="box-text">Debounced search, keyboard nav</text>
  <text x="120" y="280" class="box-text-sm">components/meal-builder/search</text>

  <rect x="390" y="218" width="270" height="88" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="410" y="242" class="box-title">Selected Food Panel</text>
  <text x="410" y="262" class="box-text">Quantity input, macro preview</text>
  <text x="410" y="280" class="box-text-sm">food-detail-panel, quantity-input</text>

  <rect x="680" y="218" width="270" height="88" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="700" y="242" class="box-title">Meal Builder</text>
  <text x="700" y="262" class="box-text">Add, edit, remove ingredients</text>
  <text x="700" y="280" class="box-text-sm">meal-ingredient-row, add-to-meal</text>

  <rect x="970" y="218" width="330" height="88" rx="10" fill="#FFFFFF" stroke="#1A6B52" stroke-width="1.5"/>
  <text x="990" y="242" class="box-title">Nutrition Summary Dashboard</text>
  <text x="990" y="262" class="box-text">KPI cards: calories, protein, macros</text>
  <text x="990" y="280" class="box-text-sm">nutrition-summary-bar</text>

  <line x1="700" y1="326" x2="700" y2="356" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="356" width="620" height="168" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="378" class="layer-label">3. State Layer</text>

  <rect x="100" y="396" width="170" height="56" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="118" y="420" class="box-title">MealProvider</text>
  <text x="118" y="438" class="box-text-sm">React Context</text>

  <rect x="290" y="396" width="170" height="56" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="308" y="420" class="box-title">Custom Hooks</text>
  <text x="308" y="438" class="box-text-sm">useMeal, useFoodSearch</text>

  <rect x="480" y="396" width="170" height="56" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="498" y="420" class="box-title">Session Persistence</text>
  <text x="498" y="438" class="box-text-sm">lib/storage/meal-session</text>

  <rect x="100" y="468" width="550" height="40" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="118" y="492" class="box-text">In-memory: ingredients[], search query, selected food, nutrition snapshot</text>

  <rect x="720" y="356" width="620" height="168" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="378" class="layer-label">6. Business Logic Layer</text>
  <text x="960" y="378" class="box-text-sm">Pure TypeScript (lib/)</text>

  <rect x="760" y="396" width="130" height="56" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="778" y="420" class="box-title">Search</text>
  <text x="778" y="438" class="box-text-sm">Normalization</text>

  <rect x="905" y="396" width="130" height="56" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="923" y="420" class="box-title">Quantity</text>
  <text x="923" y="438" class="box-text-sm">Conversion</text>

  <rect x="1050" y="396" width="130" height="56" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="1068" y="420" class="box-title">Nutrition</text>
  <text x="1068" y="438" class="box-text-sm">Scaling</text>

  <rect x="1195" y="396" width="125" height="56" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="1213" y="420" class="box-title">Meal Total</text>
  <text x="1213" y="438" class="box-text-sm">Calculation</text>

  <rect x="760" y="468" width="560" height="40" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="778" y="492" class="box-text">scaleNutrition, convertToGrams, calculateMealTotals, USDA normalizers</text>

  <line x1="680" y1="440" x2="720" y2="440" stroke="#1A6B52" stroke-width="1.5" marker-end="url(#arrow-brand)"/>
  <line x1="720" y1="452" x2="680" y2="452" stroke="#1A6B52" stroke-width="1.5" marker-end="url(#arrow-brand)"/>

  <line x1="370" y1="524" x2="370" y2="554" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="950" y1="524" x2="950" y2="554" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="554" width="620" height="120" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="576" class="layer-label">4. API Layer</text>
  <text x="210" y="576" class="layer-title">Next.js Route Handlers (Server)</text>

  <rect x="100" y="596" width="250" height="56" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.3"/>
  <text x="118" y="620" class="box-title">GET /api/foods/search</text>
  <text x="118" y="638" class="box-text-sm">Keyword search, validation, normalize</text>

  <rect x="370" y="596" width="270" height="56" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.3"/>
  <text x="388" y="620" class="box-title">GET /api/foods/[fdcId]</text>
  <text x="388" y="638" class="box-text-sm">Food detail, nutrient extraction</text>

  <line x1="370" y1="674" x2="370" y2="704" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="704" width="620" height="88" rx="12" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="726" class="layer-label">5. External Service Layer</text>

  <rect x="100" y="742" width="540" height="40" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="118" y="766" class="box-title">USDA FoodData Central API</text>
  <text x="340" y="766" class="box-text">api.nal.usda.gov/fdc/v1 | foods/search | food/{fdcId}</text>

  <rect x="720" y="554" width="620" height="238" rx="12" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="576" class="layer-label">7. Storage Layer</text>

  <rect x="760" y="596" width="540" height="72" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.3"/>
  <text x="778" y="620" class="box-title">sessionStorage</text>
  <text x="778" y="640" class="box-text">Persists meal ingredients across page refresh</text>
  <text x="778" y="658" class="box-text-sm">Key: macromate-meal | JSON serialized Ingredient[]</text>

  <path d="M565 452 L565 520 L1030 520 L1030 596" fill="none" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="780" y="512" class="box-text-sm" fill="#7C3AED">read / write on meal change</text>

  <rect x="720" y="688" width="620" height="104" rx="12" fill="#FFFFFF" stroke="#1A6B52" stroke-width="1.5" stroke-dasharray="6 4" filter="url(#shadow)"/>
  <text x="740" y="712" class="layer-label" fill="#1A6B52">Data Flow</text>

  <g>
    <circle cx="760" cy="748" r="10" fill="#1A6B52"/>
    <text x="760" y="752" text-anchor="middle" class="flow-num">1</text>
    <text x="778" y="752" class="flow-label">User searches food</text>
    <text x="920" y="752" class="box-text-sm">-&gt;</text>
    <circle cx="948" cy="748" r="10" fill="#1A6B52"/>
    <text x="948" y="752" text-anchor="middle" class="flow-num">2</text>
    <text x="966" y="752" class="flow-label">API route</text>
    <text x="1040" y="752" class="box-text-sm">-&gt;</text>
    <circle cx="1068" cy="748" r="10" fill="#1A6B52"/>
    <text x="1068" y="752" text-anchor="middle" class="flow-num">3</text>
    <text x="1086" y="752" class="flow-label">USDA API</text>
  </g>

  <g>
    <circle cx="760" cy="778" r="10" fill="#1A6B52"/>
    <text x="760" y="782" text-anchor="middle" class="flow-num">4</text>
    <text x="778" y="782" class="flow-label">Nutrition data returned</text>
    <text x="930" y="782" class="box-text-sm">-&gt;</text>
    <circle cx="958" cy="778" r="10" fill="#1A6B52"/>
    <text x="958" y="782" text-anchor="middle" class="flow-num">5</text>
    <text x="976" y="782" class="flow-label">Meal Builder</text>
    <text x="1070" y="782" class="box-text-sm">-&gt;</text>
    <circle cx="1098" cy="778" r="10" fill="#1A6B52"/>
    <text x="1098" y="782" text-anchor="middle" class="flow-num">6</text>
    <text x="1116" y="782" class="flow-label">Nutrition Engine</text>
    <text x="1220" y="782" class="box-text-sm">-&gt;</text>
    <circle cx="1248" cy="778" r="10" fill="#1A6B52"/>
    <text x="1248" y="782" text-anchor="middle" class="flow-num">7</text>
    <text x="1266" y="782" class="flow-label">Summary</text>
    <text x="1318" y="778" class="box-text-sm">-&gt;</text>
    <text x="1330" y="782" class="flow-label">Storage</text>
  </g>

  <path d="M430 704 L430 690 L1280 690 L1280 262 L1300 262" fill="none" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="860" y="684" class="box-text-sm" fill="#DC2626">normalized nutrition response</text>

  <rect x="60" y="820" width="1280" height="56" rx="10" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1"/>
  <text x="80" y="844" class="legend-text"><tspan font-weight="600" fill="#111827">Legend:</tspan></text>
  <line x1="150" y1="840" x2="190" y2="840" stroke="#1A6B52" stroke-width="2"/>
  <text x="198" y="844" class="legend-text">Client-side flow</text>
  <line x1="320" y1="840" x2="360" y2="840" stroke="#2563EB" stroke-width="2"/>
  <text x="368" y="844" class="legend-text">API request</text>
  <line x1="470" y1="840" x2="510" y2="840" stroke="#DC2626" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="518" y="844" class="legend-text">External response</text>
  <line x1="660" y1="840" x2="700" y2="840" stroke="#7C3AED" stroke-width="2"/>
  <text x="708" y="844" class="legend-text">Persistence</text>
  <text x="80" y="864" class="box-text-sm">API key (USDA_API_KEY) stays server-side only | No database in MVP | All nutrition math runs in the browser</text>
</svg>
